<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#020617">
    <title>Værvakt.no</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 15%, rgba(56, 189, 248, 0.18), transparent 30%),
          radial-gradient(circle at 82% 20%, rgba(99, 102, 241, 0.16), transparent 28%),
          linear-gradient(180deg, #0f172a 0%, #020617 100%);
      }

      main {
        width: min(100%, 520px);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 32px;
        padding: clamp(28px, 7vw, 48px);
        background: rgba(15, 23, 42, 0.76);
        box-shadow: 0 28px 80px rgba(2, 6, 23, 0.45);
        text-align: center;
      }

      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.7;
      }

      .eyebrow {
        color: #7dd3fc;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 12px;
        color: #f8fafc;
        font-size: clamp(2.4rem, 12vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: -0.08em;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Værvakt.no</p>
      <h1>V2 bygges</h1>
      <p>Vi starter med blanke ark og bygger en ryddigere lokal værapp fra bunnen av.</p>
    </main>
  </body>
</html>
