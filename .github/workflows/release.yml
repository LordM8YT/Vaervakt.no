name: Create release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build release package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Prepare release folder
        run: |
          mkdir -p release/vaervakt-no
          rsync \
            --archive \
            --delete \
            --exclude-from=".github/release-package-exclude.txt" \
            ./ \
            release/vaervakt-no/

      - name: Create ZIP package and checksum
        run: |
          cd release
          zip -r "../vaervakt-no-${{ github.ref_name }}.zip" "vaervakt-no"
          cd ..
          sha256sum "vaervakt-no-${{ github.ref_name }}.zip" > "vaervakt-no-${{ github.ref_name }}.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vaervakt-no-${{ github.ref_name }}.zip
            vaervakt-no-${{ github.ref_name }}.sha256
