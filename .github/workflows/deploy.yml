name: Deploy static PWA to Webhuset

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: webhuset-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync static files
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install rsync dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Prepare SSH
        env:
          WEBHUSET_HOST: linweb22.hmg9.webhuset.no
          WEBHUSET_KNOWN_HOSTS: ${{ secrets.WEBHUSET_KNOWN_HOSTS }}
          WEBHUSET_PASSWORD: ${{ secrets.WEBHUSET_PASSWORD || vars.WEBHUSET_PASSWORD }}
          WEBHUSET_PORT: 22
          WEBHUSET_SSH_KEY: ${{ secrets.WEBHUSET_SSH_KEY }}
          WEBHUSET_USERNAME: xnvrvaktpuano
        run: |
          set -eu
          : "${WEBHUSET_HOST:?Missing WEBHUSET_HOST}"
          : "${WEBHUSET_USERNAME:?Missing WEBHUSET_USERNAME}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -n "${WEBHUSET_SSH_KEY:-}" ]; then
            printf '%s\n' "$WEBHUSET_SSH_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
          elif [ -z "${WEBHUSET_PASSWORD:-}" ]; then
            echo "Missing WEBHUSET_SSH_KEY or WEBHUSET_PASSWORD secret"
            exit 1
          fi

          if [ -n "${WEBHUSET_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$WEBHUSET_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${WEBHUSET_PORT:-22}" -H "$WEBHUSET_HOST" >> ~/.ssh/known_hosts
          fi

          chmod 644 ~/.ssh/known_hosts

      - name: Ensure remote path exists
        env:
          WEBHUSET_HOST: linweb22.hmg9.webhuset.no
          WEBHUSET_PASSWORD: ${{ secrets.WEBHUSET_PASSWORD || vars.WEBHUSET_PASSWORD }}
          WEBHUSET_PORT: 22
          WEBHUSET_REMOTE_PATH: /home/X/xnvrvaktpuano/www
          WEBHUSET_SSH_KEY: ${{ secrets.WEBHUSET_SSH_KEY }}
          WEBHUSET_USERNAME: xnvrvaktpuano
        run: |
          set -eu
          : "${WEBHUSET_REMOTE_PATH:?Missing WEBHUSET_REMOTE_PATH}"

          if [ -z "${WEBHUSET_SSH_KEY:-}" ] && [ -n "${WEBHUSET_PASSWORD:-}" ]; then
            sshpass -p "${WEBHUSET_PASSWORD}" \
              ssh -p "${WEBHUSET_PORT:-22}" \
              "${WEBHUSET_USERNAME}@${WEBHUSET_HOST}" \
              "mkdir -p '${WEBHUSET_REMOTE_PATH}'"
          else
            ssh -p "${WEBHUSET_PORT:-22}" \
              "${WEBHUSET_USERNAME}@${WEBHUSET_HOST}" \
              "mkdir -p '${WEBHUSET_REMOTE_PATH}'"
          fi

      - name: Locate existing production .env
        env:
          WEBHUSET_HOST: linweb22.hmg9.webhuset.no
          WEBHUSET_PASSWORD: ${{ secrets.WEBHUSET_PASSWORD || vars.WEBHUSET_PASSWORD }}
          WEBHUSET_PORT: 22
          WEBHUSET_REMOTE_PATH: /home/X/xnvrvaktpuano/www
          WEBHUSET_SSH_KEY: ${{ secrets.WEBHUSET_SSH_KEY }}
          WEBHUSET_USERNAME: xnvrvaktpuano
        run: |
          set -eu

          remote_find_command="find /home/X/xnvrvaktpuano -maxdepth 5 -type f \( -name '.env' -o -name '.env.local' -o -name '.env.production' \) -printf '%p\n' 2>/dev/null | sed 's#^/home/X/xnvrvaktpuano#~#'"

          if [ -z "${WEBHUSET_SSH_KEY:-}" ] && [ -n "${WEBHUSET_PASSWORD:-}" ]; then
            found="$(sshpass -p "${WEBHUSET_PASSWORD}" ssh -p "${WEBHUSET_PORT:-22}" "${WEBHUSET_USERNAME}@${WEBHUSET_HOST}" "$remote_find_command" || true)"
          else
            found="$(ssh -p "${WEBHUSET_PORT:-22}" "${WEBHUSET_USERNAME}@${WEBHUSET_HOST}" "$remote_find_command" || true)"
          fi

          if [ -n "$found" ]; then
            echo "Found existing env file(s):"
            printf '%s\n' "$found"
          else
            echo "No existing .env file found under account home."
          fi

      - name: Provision production .env from secrets
        env:
          DATABASE_HOST: ${{ secrets.DATABASE_HOST || vars.DATABASE_HOST }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME || vars.DATABASE_NAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD || vars.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT || vars.DATABASE_PORT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
          DATABASE_USER: ${{ secrets.DATABASE_USER || vars.DATABASE_USER }}
          DB_HOST: ${{ secrets.DB_HOST || vars.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME || vars.DB_NAME }}
          DB_PASS: ${{ secrets.DB_PASS || vars.DB_PASS }}
          DB_PORT: ${{ secrets.DB_PORT || vars.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER || vars.DB_USER }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE || vars.MYSQL_DATABASE }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST || vars.MYSQL_HOST }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD || vars.MYSQL_PASSWORD }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT || vars.MYSQL_PORT }}
          MYSQL_USER: ${{ secrets.MYSQL_USER || vars.MYSQL_USER }}
          SUPPORT_LABEL: ${{ secrets.SUPPORT_LABEL || vars.SUPPORT_LABEL }}
          SUPPORT_URL: ${{ secrets.SUPPORT_URL || vars.SUPPORT_URL }}
          VAERVAKT_DEBUG: ${{ secrets.VAERVAKT_DEBUG || vars.VAERVAKT_DEBUG }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE || vars.VAPID_PRIVATE }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY || vars.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC || vars.VAPID_PUBLIC }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY || vars.VAPID_PUBLIC_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT || vars.VAPID_SUBJECT }}
          WEBHUSET_HOST: linweb22.hmg9.webhuset.no
          WEBHUSET_PASSWORD: ${{ secrets.WEBHUSET_PASSWORD || vars.WEBHUSET_PASSWORD }}
          WEBHUSET_PORT: 22
          WEBHUSET_REMOTE_PATH: /home/X/xnvrvaktpuano/www
          WEBHUSET_SSH_KEY: ${{ secrets.WEBHUSET_SSH_KEY }}
          WEBHUSET_USERNAME: xnvrvaktpuano
        run: |
          set -eu

          upload_env_file() {
            src="$1"
            if [ -z "${WEBHUSET_SSH_KEY:-}" ] && [ -n "${WEBHUSET_PASSWORD:-}" ]; then
              sshpass -p "${WEBHUSET_PASSWORD}" \
                scp -P "${WEBHUSET_PORT:-22}" \
                "$src" \
                "${WEBHUSET_USERNAME}@${WEBHUSET_HOST}:${WEBHUSET_REMOTE_PATH}/.env"
              sshpass -p "${WEBHUSET_PASSWORD}" \
                ssh -p "${WEBHUSET_PORT:-22}" \
                "${WEBHUSET_USERNAME}@${WEBHUSET_HOST}" \
                "chmod 600 '${WEBHUSET_REMOTE_PATH}/.env'"
            else
              scp -P "${WEBHUSET_PORT:-22}" \
                "$src" \
                "${WEBHUSET_USERNAME}@${WEBHUSET_HOST}:${WEBHUSET_REMOTE_PATH}/.env"
              ssh -p "${WEBHUSET_PORT:-22}" \
                "${WEBHUSET_USERNAME}@${WEBHUSET_HOST}" \
                "chmod 600 '${WEBHUSET_REMOTE_PATH}/.env'"
            fi
          }

          if [ -f ".env" ]; then
            upload_env_file ".env"
            echo "Production .env provisioned from committed .env."
            exit 0
          fi

          PROD_DB_HOST="${DB_HOST:-${MYSQL_HOST:-${DATABASE_HOST:-}}}"
          PROD_DB_NAME="${DB_NAME:-${MYSQL_DATABASE:-${DATABASE_NAME:-}}}"
          PROD_DB_USER="${DB_USER:-${MYSQL_USER:-${DATABASE_USER:-}}}"
          PROD_DB_PASS="${DB_PASS:-${MYSQL_PASSWORD:-${DATABASE_PASSWORD:-}}}"
          PROD_DB_PORT="${DB_PORT:-${MYSQL_PORT:-${DATABASE_PORT:-}}}"

          if [ -z "${DATABASE_URL:-}" ] && { [ -z "$PROD_DB_HOST" ] || [ -z "$PROD_DB_NAME" ] || [ -z "$PROD_DB_USER" ]; }; then
            remote_env_check="test -s '${WEBHUSET_REMOTE_PATH}/.env' && grep -q '^DB_HOST=' '${WEBHUSET_REMOTE_PATH}/.env' && grep -q '^DB_NAME=' '${WEBHUSET_REMOTE_PATH}/.env' && grep -q '^DB_USER=' '${WEBHUSET_REMOTE_PATH}/.env'"
            if [ -z "${WEBHUSET_SSH_KEY:-}" ] && [ -n "${WEBHUSET_PASSWORD:-}" ]; then
              if sshpass -p "${WEBHUSET_PASSWORD}" ssh -p "${WEBHUSET_PORT:-22}" "${WEBHUSET_USERNAME}@${WEBHUSET_HOST}" "$remote_env_check"; then
                echo "Using existing production .env on Webhuset."
                exit 0
              fi
            else
              if ssh -p "${WEBHUSET_PORT:-22}" "${WEBHUSET_USERNAME}@${WEBHUSET_HOST}" "$remote_env_check"; then
                echo "Using existing production .env on Webhuset."
                exit 0
              fi
            fi

            echo "::error::Production .env is missing, and GitHub Secrets do not include DB_HOST, DB_NAME and DB_USER. Add DB/VAPID secrets in GitHub or create ${WEBHUSET_REMOTE_PATH}/.env on Webhuset."
            exit 1
          fi

          umask 077
          env_file="$(mktemp)"
          {
            if [ -n "${DATABASE_URL:-}" ]; then printf 'DATABASE_URL=%s\n' "$DATABASE_URL"; fi
            if [ -n "$PROD_DB_HOST" ]; then printf 'DB_HOST=%s\n' "$PROD_DB_HOST"; fi
            if [ -n "$PROD_DB_NAME" ]; then printf 'DB_NAME=%s\n' "$PROD_DB_NAME"; fi
            if [ -n "$PROD_DB_USER" ]; then printf 'DB_USER=%s\n' "$PROD_DB_USER"; fi
            printf 'DB_PASS=%s\n' "$PROD_DB_PASS"
            if [ -n "$PROD_DB_PORT" ]; then printf 'DB_PORT=%s\n' "$PROD_DB_PORT"; fi
            if [ -n "${VAPID_PUBLIC_KEY:-${VAPID_PUBLIC:-}}" ]; then printf 'VAPID_PUBLIC_KEY=%s\n' "${VAPID_PUBLIC_KEY:-${VAPID_PUBLIC:-}}"; fi
            if [ -n "${VAPID_PRIVATE_KEY:-${VAPID_PRIVATE:-}}" ]; then printf 'VAPID_PRIVATE_KEY=%s\n' "${VAPID_PRIVATE_KEY:-${VAPID_PRIVATE:-}}"; fi
            printf 'VAPID_SUBJECT=%s\n' "${VAPID_SUBJECT:-mailto:patrick@vaarvakt.no}"
            printf 'VAERVAKT_DEBUG=%s\n' "${VAERVAKT_DEBUG:-0}"
            if [ -n "${SUPPORT_URL:-}" ]; then printf 'SUPPORT_URL=%s\n' "$SUPPORT_URL"; fi
            if [ -n "${SUPPORT_LABEL:-}" ]; then printf 'SUPPORT_LABEL=%s\n' "$SUPPORT_LABEL"; fi
          } > "$env_file"

          upload_env_file "$env_file"
          rm -f "$env_file"
          echo "Production .env provisioned from GitHub Secrets."

      - name: Sync PWA to Webhuset
        timeout-minutes: 5
        env:
          WEBHUSET_HOST: linweb22.hmg9.webhuset.no
          WEBHUSET_PASSWORD: ${{ secrets.WEBHUSET_PASSWORD || vars.WEBHUSET_PASSWORD }}
          WEBHUSET_PORT: 22
          WEBHUSET_REMOTE_PATH: /home/X/xnvrvaktpuano/www
          WEBHUSET_SSH_KEY: ${{ secrets.WEBHUSET_SSH_KEY }}
          WEBHUSET_USERNAME: xnvrvaktpuano
        run: |
          set -eu

          if [ -z "${WEBHUSET_SSH_KEY:-}" ] && [ -n "${WEBHUSET_PASSWORD:-}" ]; then
            sshpass -p "${WEBHUSET_PASSWORD}" \
              rsync \
              --recursive \
              --links \
              --compress \
              --timeout=60 \
              --delete \
              --human-readable \
              --itemize-changes \
              --omit-dir-times \
              --no-times \
              --no-perms \
              --no-owner \
              --no-group \
              --filter='P /statistikk/' \
              --exclude-from=".github/rsync-exclude.txt" \
              -e "ssh -o ConnectTimeout=20 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -p ${WEBHUSET_PORT:-22}" \
              ./ \
              "${WEBHUSET_USERNAME}@${WEBHUSET_HOST}:${WEBHUSET_REMOTE_PATH}"
          else
            rsync \
              --recursive \
              --links \
              --compress \
              --timeout=60 \
              --delete \
              --human-readable \
              --itemize-changes \
              --omit-dir-times \
              --no-times \
              --no-perms \
              --no-owner \
              --no-group \
              --filter='P /statistikk/' \
              --exclude-from=".github/rsync-exclude.txt" \
              -e "ssh -o ConnectTimeout=20 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -p ${WEBHUSET_PORT:-22}" \
              ./ \
              "${WEBHUSET_USERNAME}@${WEBHUSET_HOST}:${WEBHUSET_REMOTE_PATH}"
          fi
