name: Privacy retention cleanup

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: privacy-retention-cleanup
  cancel-in-progress: true

jobs:
  cleanup:
    name: Apply retention and remove retired data
    runs-on: ubuntu-latest
    steps:
      - name: Call privacy cleanup endpoints
        run: |
          set -eu
          base_url="https://xn--vrvakt-pua.no/api"
          curl --fail --silent --show-error --max-time 20 "${base_url}/reports.php?limit=1&maxAgeHours=1&location=__privacy_cleanup__"
          curl --fail --silent --show-error --max-time 20 "${base_url}/bath-reports.php?cleanup=1"
          curl --fail --silent --show-error --max-time 20 "${base_url}/glimpses.php?cleanup=1"
          curl --fail --silent --show-error --max-time 20 "${base_url}/hub.php?cleanup=1"
          curl --fail --silent --show-error --max-time 20 --request POST "${base_url}/track.php"
