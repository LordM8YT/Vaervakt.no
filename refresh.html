<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#020617">
    <title>Oppdaterer Værvakt.no</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.18), transparent 30%),
          linear-gradient(180deg, #0f172a, #020617);
        color: #e2e8f0;
      }

      main {
        width: min(420px, calc(100% - 40px));
        border: 1px solid rgba(226, 232, 240, 0.14);
        border-radius: 28px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 28px 80px rgba(2, 6, 23, 0.42);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Oppdaterer Værvakt.no</h1>
      <p>Rydder gammel app-cache og laster inn nyeste versjon.</p>
    </main>
    <script>
      async function resetAppCache() {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        window.location.replace('/?cache-reset=' + Date.now());
      }

      resetAppCache().catch(() => {
        window.location.replace('/?cache-reset=' + Date.now());
      });
    </script>
  </body>
</html>
