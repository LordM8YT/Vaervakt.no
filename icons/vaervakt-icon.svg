<!-- Vaervakt PWA: sun behind cloud, slate/cyan palette (maskable-safe center graphic) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Vaervakt">
  <defs>
    <linearGradient id="sol" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>
  <!-- Sun (partly behind cloud) -->
  <circle cx="352" cy="160" r="72" fill="url(#sol)"/>
  <g fill="#64748b" stroke="#475569" stroke-width="4">
    <ellipse cx="200" cy="300" rx="140" ry="88" fill="#94a3b8"/>
    <ellipse cx="280" cy="280" rx="120" ry="80" fill="#cbd5e1"/>
    <ellipse cx="340" cy="310" rx="100" ry="72" fill="#e2e8f0"/>
  </g>
  <!-- Subtle cyan glow -->
  <ellipse cx="256" cy="400" rx="120" ry="16" fill="#06b6d4" opacity="0.35"/>
</svg>
